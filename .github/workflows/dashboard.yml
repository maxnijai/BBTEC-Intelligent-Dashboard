name: Update Dashboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install openpyxl
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Restore Google key
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_KEY }}' > service_account.json

      - name: Run dashboard
        run: python auto_dashboard.py

      - name: Commit and push dashboard
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add dashboard_output/dashboard.html last_processed.txt

          git diff --cached --quiet && echo "no change" && exit 0

          git commit -m "auto dashboard update"

          git pull --rebase origin main
          git push origin main
