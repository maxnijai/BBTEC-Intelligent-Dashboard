name: Update Dashboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install packages
        run: |
          pip install openpyxl
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Restore Google key
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_KEY }}' > service_account.json

      - name: Run dashboard script
        run: python auto_dashboard.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture dashboard screenshot
        run: |
          rm -f dashboard_output/dashboard.png dashboard_output/dashboard-debug.png

          python -m http.server 8000 &
          sleep 3

          cat > capture.js <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              viewport: { width: 1600, height: 1800 }
            });

            await page.goto('http://127.0.0.1:8000/dashboard_output/dashboard.html', {
              waitUntil: 'networkidle'
            });

            // คลิกแท็บ Executive Summary
            await page.getByRole('button', { name: /Executive Summary/i }).click();

            // รอให้ section นี้แสดงจริง
            const card = page.locator('#executive-summary-tab');
            await card.waitFor({ state: 'visible', timeout: 30000 });

            // แคปทั้ง Executive Summary
            await card.screenshot({
              path: 'dashboard_output/dashboard.png'
            });

            await browser.close();
          })();
          EOF

          node capture.js
      - name: Commit dashboard
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add dashboard_output/dashboard.html dashboard_output/dashboard.png dashboard_output/dashboard-debug.png dashboard_output/summary.json last_processed.txt

          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi

          git commit -m "auto dashboard update"
          git push --force-with-lease origin HEAD:main

      - name: Send Telegram photo
        run: |
          SOURCE_FILE=$(python -c "import json; print(json.load(open('dashboard_output/summary.json', encoding='utf-8'))['source_file'])")
          TOTAL_TICKETS=$(python -c "import json; print(json.load(open('dashboard_output/summary.json', encoding='utf-8'))['total_tickets'])")

          CAPTION=$(cat <<EOF
          BBTEC Intelligent Dashboard Updated

          Source file: $SOURCE_FILE
          Total tickets: $TOTAL_TICKETS

          Dashboard:
          https://maxnijai.github.io/BBTEC-Intelligent-Dashboard/dashboard_output/dashboard.html
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F photo=@"dashboard_output/dashboard.png" \
            -F caption="$CAPTION"
