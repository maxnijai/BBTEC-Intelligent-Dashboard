name: Update Dashboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install packages
        run: |
          pip install openpyxl
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Restore Google key
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_KEY }}' > service_account.json

      - name: Run dashboard script
        run: python auto_dashboard.py

      - name: Commit dashboard
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add dashboard_output/dashboard.html last_processed.txt

          if git diff --cached --quiet; then
          echo "no change"
          exit 0
          fi

          git commit -m "auto dashboard update"
          git push --force-with-lease origin HEAD:main
